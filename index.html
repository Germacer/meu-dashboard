<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Germacer - Unified Audio System</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }
  
  body {
    background-color: #000000;
    color: #FFFFFF;
    overflow: hidden;
    user-select: none;
    height: 100vh;
  }

  #edge-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none; z-index: 99;
    box-shadow: inset 0 0 0px rgba(0, 0, 0, 0);
  }

  .edge-flash-yellow { animation: singleEdgeYellow 1s ease-out forwards; }
  @keyframes singleEdgeYellow {
    0% { box-shadow: inset 0 0 100px rgba(255, 215, 0, 0.8); }
    100% { box-shadow: inset 0 0 0px rgba(0,0,0,0); }
  }

  .card-view {
    display: none;
    width: 350px;
    background: rgba(15, 15, 15, 0.98);
    border: 1px solid #FFD700;
    border-radius: 15px;
    padding: 30px;
    text-align: center;
    cursor: pointer;
    box-shadow: 0 10px 40px rgba(0,0,0,0.8);
    animation: cardSlide 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    z-index: 105;
  }
  @keyframes cardSlide {
    from { transform: translateX(120px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  .card-icon { font-size: 3rem; color: #FFD700; margin-bottom: 10px; }
  .card-title { font-size: 1.2rem; font-weight: 800; text-transform: uppercase; color: #FFD700; letter-spacing: 2px; }
  .card-msg { font-size: 0.9rem; color: #aaa; margin-top: 10px; line-height: 1.4; }

  #main-dash { width: 100vw; height: 100vh; display: flex; }
  .panel { width: 50%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; }

  .speed-value { font-size: 12.5rem; line-height: 1; font-weight: 900; transition: color 0.4s; }
  .speed-unit { font-size: 1.4rem; color: #222; font-weight: bold; letter-spacing: 4px; }

  .v-verde { color: #00FF00; }
  .v-azul { color: #007BFF; }
  .v-amarelo { color: #FFD700; }
  .v-vermelho { color: #FF0000; }

  .car-status { display: flex; gap: 40px; margin-top: 25px; }
  .status-item { text-align: center; color: #333; text-transform: uppercase; font-size: 0.8rem; }
  .status-item span { display: block; font-size: 2.2rem; color: #FFF; font-weight: 800; margin-top: 5px; }

  #splash {
    position: fixed; width: 100vw; height: 100vh; background: #000; z-index: 130;
    display: flex; justify-content: center; align-items: center; transition: opacity 0.5s;
  }
  .logo { color: #FFD700; font-size: 5rem; font-weight: 900; letter-spacing: 5px; }
</style>
</head>
<body id="bg-body">

  <div id="edge-overlay"></div>

  <div id="splash">
    <div class="logo">GERMACER</div>
  </div>

  <div id="main-dash">
    <div class="panel">
      <div id="speed-display" class="speed-value">0</div>
      <div class="speed-unit">KM/H</div>
      <div class="car-status">
        <div class="status-item">Fuel<span id="fuel-display">--</span></div>
        <div class="status-item">Temp<span id="temp-display">--</span></div>
      </div>
    </div>
    
    <div class="panel" id="right-panel">
      <div id="speed-card" class="card-view" onclick="fecharCard('speed')">
        <div class="card-icon">⚠️</div>
        <div class="card-title">Velocidade Crítica</div>
        <div class="card-msg">Acima de 100 KM/H.<br>Atenção total.</div>
      </div>

      <div id="radar-card" class="card-view" onclick="fecharCard('radar')">
        <div class="card-icon">📡</div>
        <div class="card-title">Zona de Radar</div>
        <div class="card-msg">Velocidade entre 45 e 60 KM/H.<br>Respeite os limites.</div>
      </div>

      <div id="idle-card" class="card-view" onclick="fecharCard('idle')">
        <div class="card-icon">🅿️</div>
        <div class="card-title">Veículo Parado</div>
        <div class="card-msg">Imobilidade prolongada detectada.</div>
      </div>
    </div>
  </div>

  <script>
    const edge = document.getElementById('edge-overlay');
    const speedTxt = document.getElementById('speed-display');
    const splash = document.getElementById('splash');
    const dash = document.getElementById('main-dash');
    const cardSpeed = document.getElementById('speed-card');
    const cardRadar = document.getElementById('radar-card');
    const cardIdle = document.getElementById('idle-card');

    let audioCtx = null;
    let trig40 = false, trig60 = false, trig100 = false;
    let trigger45Flash = false;
    let cardSpeedDismissed = false, cardRadarDismissed = false, cardIdleDismissed = false;
    
    let idleTimeout = null;
    let idleAudioInterval = null;

    function playTone(freq, duration, type = 'triangle', double = false) {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      
      const play = (timeOffset) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime + timeOffset);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime + timeOffset);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + timeOffset + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(audioCtx.currentTime + timeOffset);
        osc.stop(audioCtx.currentTime + timeOffset + duration);
      };

      play(0);
      if (double) setTimeout(() => play(0), 150);
    }

    function startIdleBeep() {
      if (!idleAudioInterval) {
        playTone(600, 0.8);
        idleAudioInterval = setInterval(() => {
          playTone(600, 0.8);
        }, 1000);
      }
    }

    function stopIdleBeep() {
      clearInterval(idleAudioInterval);
      idleAudioInterval = null;
    }

    setTimeout(() => {
      splash.style.opacity = '0';
      setTimeout(() => { 
        splash.style.display = 'none'; 
        dash.style.display = 'flex'; 
        carregarStatus();
        iniciarGPS();
      }, 500);
    }, 1500);

    function carregarStatus() {
      setTimeout(() => document.getElementById('fuel-display').innerHTML = '<font color="#FFD700">20%</font>', 800);
      setTimeout(() => document.getElementById('temp-display').textContent = '90ºC', 1600);
    }

    function fecharCard(tipo) {
      if(tipo === 'speed') { cardSpeed.style.display = 'none'; cardSpeedDismissed = true; }
      if(tipo === 'radar') { cardRadar.style.display = 'none'; cardRadarDismissed = true; }
      if(tipo === 'idle') { cardIdle.style.display = 'none'; cardIdleDismissed = true; stopIdleBeep(); }
    }

    function iniciarGPS() {
      if ("geolocation" in navigator) {
        navigator.geolocation.watchPosition(
          (position) => {
            // O GPS retorna em m/s. Convertendo para km/h (* 3.6)
            let velocidadeReal = position.coords.speed ? position.coords.speed * 3.6 : 0;
            if (velocidadeReal < 0) velocidadeReal = 0;
            atualizarInterface(velocidadeReal);
          },
          (error) => {
            console.error("Erro ao acessar GPS: ", error);
          },
          {
            enableHighAccuracy: true,
            maximumAge: 0,
            timeout: 5000
          }
        );
      } else {
        alert("Geolocalização não suportada neste dispositivo.");
      }
    }

    function atualizarInterface(velocidade) {
      const v = Math.round(velocidade);
      speedTxt.textContent = v;

      speedTxt.className = "speed-value";
      if (v <= 20) speedTxt.classList.add('v-verde');
      else if (v <= 39) speedTxt.classList.add('v-azul');
      else if (v <= 59) speedTxt.classList.add('v-amarelo');
      else speedTxt.classList.add('v-vermelho');

      if (v >= 40 && v < 60 && !trig40) { playTone(600, 0.15); trig40 = true; }
      else if (v < 35) trig40 = false;

      if (v >= 60 && v < 100 && !trig60) { playTone(600, 0.15, 'triangle', true); trig60 = true; }
      else if (v < 55) trig60 = false;

      if (v >= 100 && !trig100) { playTone(600, 0.8); trig100 = true; }
      else if (v < 95) trig100 = false;

      if (v === 0) {
        if (!idleTimeout && !cardIdleDismissed && cardIdle.style.display !== 'block') {
          idleTimeout = setTimeout(() => { 
            cardIdle.style.display = 'block'; 
            startIdleBeep(); 
          }, 20000);
        }
      } else {
        clearTimeout(idleTimeout); idleTimeout = null;
        cardIdle.style.display = 'none'; cardIdleDismissed = false; stopIdleBeep();
      }

      if (v < 40) { trigger45Flash = false; cardRadarDismissed = false; }
      if (v < 95) cardSpeedDismissed = false;

      if (v >= 100) {
        if (!cardSpeedDismissed) cardSpeed.style.display = 'block';
        cardRadar.style.display = 'none';
      } 
      else if (v >= 45 && v < 60) {
        if (!trigger45Flash) {
          edge.className = ""; void edge.offsetWidth;
          edge.className = "edge-flash-yellow";
          trigger45Flash = true;
        }
        if (!cardRadarDismissed) cardRadar.style.display = 'block';
        cardSpeed.style.display = 'none';
      } 
      else {
        edge.className = ""; cardSpeed.style.display = 'none'; cardRadar.style.display = 'none';
      }
    }
  </script>
</body>
</html>
