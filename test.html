<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GERMACER - Quantum HUD</title>
    <style>
        :root {
            --bg-dark: #020205;
            --neon-blue: #00d2ff;
            --neon-red: #ff0044;
            --neon-green: #00ff88;
            --neon-yellow: #ffff00;
            --font-main: 'Orbitron', sans-serif;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-dark); color: white;
            font-family: var(--font-main); overflow: hidden;
        }

        /* --- SPLASH SCREEN --- */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 1000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; transition: opacity 0.8s ease;
        }

        #splash-screen h1 {
            color: var(--neon-yellow); font-size: 5rem; margin: 0;
            letter-spacing: 15px; text-shadow: 0 0 20px rgba(255, 255, 0, 0.5);
        }

        #start-trigger {
            margin-top: 30px; font-size: 1.2rem; color: white; cursor: pointer;
            letter-spacing: 5px; opacity: 0.7; transition: 0.3s;
        }
        #start-trigger:hover { opacity: 1; text-shadow: 0 0 10px white; }

        /* --- POPUP / CARD --- */
        #confirmation-card {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8);
            background: #111; border: 2px solid var(--neon-yellow); padding: 40px;
            border-radius: 20px; text-align: center; z-index: 1001;
            display: none; opacity: 0; transition: 0.4s;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        #confirmation-card.show { display: block; opacity: 1; transform: translate(-50%, -50%) scale(1); }

        #confirmation-card p { font-size: 1.5rem; margin-bottom: 30px; line-height: 1.4; }

        .btn-confirm {
            background: var(--neon-yellow); color: black; border: none;
            padding: 15px 40px; font-family: var(--font-main); font-weight: bold;
            border-radius: 10px; cursor: pointer; transition: 0.3s;
        }
        .btn-confirm:hover { transform: scale(1.1); box-shadow: 0 0 20px var(--neon-yellow); }

        /* --- HUD PRINCIPAL (ESTILO ANTERIOR) --- */
        #hud-content {
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; height: 100vh; opacity: 0; transition: opacity 1s ease;
        }

        /* Estilos do Velocímetro (mantidos conforme solicitado) */
        body.sleeping { animation: borderPulse 3s infinite ease-in-out; }
        @keyframes borderPulse {
            0%, 100% { box-shadow: inset 0 0 30px 5px rgba(0, 210, 255, 0.2); }
            50% { box-shadow: inset 0 0 80px 15px rgba(0, 210, 255, 0.5); }
        }
        .sleep-pulse { animation: emojiPulse 3s infinite ease-in-out; }
        @keyframes emojiPulse { 0%, 100% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.2); opacity: 1; } }

        @keyframes extremeShake {
            0% { transform: translate(0,0) rotate(0); }
            20% { transform: translate(-4px, -4px) rotate(-4deg); }
            40% { transform: translate(4px, 4px) rotate(4deg); }
            100% { transform: translate(0,0) rotate(0); }
        }
        .vibrating-rocket { animation: extremeShake 0.1s infinite; display: inline-block; }

        #grid-floor { position: fixed; bottom: -120px; width: 300%; height: 65vh; background-image: linear-gradient(0deg, transparent 24%, rgba(0, 210, 255, 0.2) 25%, rgba(0, 210, 255, 0.3) 26%, transparent 27%), linear-gradient(90deg, transparent 24%, rgba(0, 210, 255, 0.2) 25%, rgba(0, 210, 255, 0.3) 26%, transparent 27%); background-size: 80px 80px; transform: rotateX(70deg); z-index: -1; mask-image: linear-gradient(to top, rgba(0,0,0,1) 10%, transparent 90%); }
        .flow-line { position: absolute; width: 2px; height: 180px; background: linear-gradient(to bottom, transparent, white, transparent); z-index: 1; pointer-events: none; }
        @keyframes flowMove { from { transform: translateY(-110vh); } to { transform: translateY(110vh); } }

        #status-display { position: absolute; top: 40px; left: 40px; }
        #status-emoji { font-size: 4.5rem; }
        #odometer-container { position: absolute; bottom: 40px; right: 40px; text-align: right; background: rgba(255,255,255,0.03); padding: 15px 25px; border-radius: 5px; border-right: 4px solid var(--neon-blue); }
        #odo-value { font-size: 1.8rem; font-weight: 900; }
        .dash-container { position: relative; width: 600px; text-align: center; }
        .track { stroke: rgba(255,255,255,0.05); stroke-width: 20; fill: none; stroke-linecap: round; }
        .progress { fill: none; stroke-width: 22; stroke-linecap: round; stroke-dasharray: 630; stroke-dashoffset: 630; transition: stroke-dashoffset 0.3s ease-out; }
        .speed { font-size: 10rem; font-weight: 900; font-style: italic; line-height: 0.8; }
        #config-btn { position: absolute; top: 40px; right: 40px; font-size: 1.5rem; cursor: pointer; opacity: 0.3; }
        #test-panel { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.9); padding: 20px; border-radius: 15px; display: none; z-index: 100; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
</head>
<body>

<div id="splash-screen">
    <h1 id="brand-name">GERMACER</h1>
    <div id="start-trigger" onclick="showPopup()">Vamos começar?</div>
</div>

<div id="confirmation-card">
    <p>Essa viagem é realmente necessária?</p>
    <button class="btn-confirm" onclick="initApp()">SIM, INICIAR SISTEMA</button>
</div>

<div id="hud-content">
    <div id="grid-floor"></div>
    <div id="config-btn" onclick="toggleTestPanel()">⚙️</div>

    <div id="status-display">
        <div id="status-emoji">💤</div>
        <div id="status-text" class="status-label">Standby</div>
    </div>

    <div id="odometer-container">
        <div class="status-label">TOTAL TRIP</div>
        <div id="odo-value">00000.00</div>
    </div>

    <div class="dash-container" id="main-dash">
        <svg viewBox="0 0 500 300">
            <path class="track" d="M 60 250 A 180 180 0 0 1 440 250" />
            <path id="speedArc" class="progress" stroke="var(--neon-green)" d="M 60 250 A 180 180 0 0 1 440 250" />
        </svg>
        <div style="position: absolute; top: 55%; left: 50%; transform: translate(-50%, -50%);">
            <div class="speed" id="speedDisplay">0</div>
            <span style="letter-spacing: 10px; color: rgba(255,255,255,0.1);">KM/H</span>
        </div>
    </div>

    <div id="test-panel">
        <input type="range" id="speedInput" min="0" max="200" value="0">
    </div>
</div>

<script>
    const splash = document.getElementById('splash-screen');
    const popup = document.getElementById('confirmation-card');
    const hud = document.getElementById('hud-content');
    
    // Funções de Inicialização
    function showPopup() {
        popup.classList.add('show');
    }

    function initApp() {
        // Tenta entrar em Fullscreen
        if (document.documentElement.requestFullscreen) {
            document.documentElement.requestFullscreen().catch(e => console.log("Erro ao entrar em fullscreen"));
        }
        
        popup.classList.remove('show');
        splash.style.opacity = '0';
        setTimeout(() => {
            splash.style.display = 'none';
            hud.style.opacity = '1';
            startGps();
        }, 800);
    }

    // Variáveis do HUD
    const arc = document.getElementById('speedArc');
    const display = document.getElementById('speedDisplay');
    const input = document.getElementById('speedInput');
    const emoji = document.getElementById('status-emoji');
    const statusText = document.getElementById('status-text');
    const grid = document.getElementById('grid-floor');
    const odoValue = document.getElementById('odo-value');
    const testPanel = document.getElementById('test-panel');

    let currentSpeed = 0;
    let gridOffset = 0;
    let totalKm = 0;
    let lastCoords = null;
    let idleTime = 0;

    function toggleTestPanel() { testPanel.style.display = (testPanel.style.display === 'block') ? 'none' : 'block'; }

    // Lógica de Soneca
    setInterval(() => {
        if (currentSpeed === 0) {
            idleTime++;
            if (idleTime >= 30) {
                document.body.classList.add('sleeping');
                emoji.classList.add('sleep-pulse');
            }
        } else {
            idleTime = 0;
            document.body.classList.remove('sleeping');
            emoji.classList.remove('sleep-pulse');
        }
    }, 1000);

    function createFlowLine() {
        if (currentSpeed < 100) return;
        const line = document.createElement('div');
        line.className = 'flow-line';
        line.style.left = Math.random() * 100 + 'vw';
        const duration = 0.8 / (currentSpeed / 100);
        line.style.animation = `flowMove ${duration}s linear forwards`;
        document.body.appendChild(line);
        setTimeout(() => line.remove(), duration * 1000);
    }

    function startGps() {
        if ("geolocation" in navigator) {
            navigator.geolocation.watchPosition((pos) => {
                if (testPanel.style.display === 'none' || input.value == 0) {
                    const speed = pos.coords.speed ? Math.round(pos.coords.speed * 3.6) : 0;
                    updateView(speed);
                    if (lastCoords) {
                        const dist = calculateDistance(lastCoords.lat, lastCoords.lon, pos.coords.latitude, pos.coords.longitude);
                        if (dist > 0.002) { 
                            totalKm += dist; 
                            odoValue.innerText = totalKm.toFixed(2).padStart(8, '0');
                        }
                    }
                    lastCoords = { lat: pos.coords.latitude, lon: pos.coords.longitude };
                }
            }, null, { enableHighAccuracy: true });
        }
    }

    function calculateDistance(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2-lat1)*Math.PI/180;
        const dLon = (lon2-lon1)*Math.PI/180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function animate() {
        if (currentSpeed > 0) {
            gridOffset += (currentSpeed / 10) + 1;
            grid.style.backgroundPosition = `0 ${gridOffset}px`;
            if (currentSpeed >= 100 && Math.random() > 0.6) createFlowLine();
        }
        requestAnimationFrame(animate);
    }
    animate();

    function updateView(val) {
        currentSpeed = parseInt(val);
        arc.style.strokeDashoffset = 630 - (currentSpeed / 200) * 630;
        display.innerText = currentSpeed;

        if (currentSpeed >= 101) {
            emoji.innerText = "🚀";
            emoji.classList.add('vibrating-rocket');
            arc.style.stroke = "var(--neon-red)";
            display.style.color = "var(--neon-red)";
        } else if (currentSpeed >= 61) {
            emoji.innerText = "🔹";
            emoji.classList.remove('vibrating-rocket');
            arc.style.stroke = "var(--neon-blue)";
            display.style.color = "var(--neon-blue)";
        } else if (currentSpeed >= 45) {
            emoji.innerText = "⚠️";
            emoji.classList.remove('vibrating-rocket');
            arc.style.stroke = "var(--neon-yellow)";
            display.style.color = "var(--neon-yellow)";
        } else {
            emoji.innerText = currentSpeed === 0 ? "💤" : "😎";
            emoji.classList.remove('vibrating-rocket');
            arc.style.stroke = "var(--neon-green)";
            display.style.color = "var(--neon-green)";
        }
    }

    input.addEventListener('input', (e) => updateView(e.target.value));
</script>
</body>
</html>
